front:
  text: 刋印編年通載序史學之不講乆矣漢魏巳來以是名家者不過數人歷世旣逺載籍漫汗學者披文考古如乗桴渉海而欲窮其津涯未易得也至有皓首疲精弊弊於編簡文字之間問其前代因革之端紀年號名之同異何者爲正何者爲僞一治一亂姦雄割據天下之所以離與其所以合之由茫然不能對者多矣嗚呼天地之理求於簡易而可以得六合之廣據於㑹要而可以觀不居其簡而欲致其詳不執其要而欲㑹其衆斯亦惑矣族姪衡子平以文辭舉進士當仁宗朝擢爲第一自布衣時巳留心於兹學㑹蕞經傳諸家之所載研磨編綴積二十餘年而後書成列爲十卷名之曰編年通載斷自帝堯以訖于皇宋丁未之歳緫三千四百年推曆甲子以冠其首而爲之次第焉史有訛謬爲刋正之事有疑誤爲明辨之若夫世數之代易歷統之相傳年名國號散殊重複凡廢興治亂之兆割裂合并之因災祥善惡罔不具載開卷推迹粲然如黒白之在目其論譔有條理得居簡執要之術蓋歷代史籍之管轄也夫以二十萬言而包括三千四百年之事上下馳騁靡有缺漏措意初若煩勞而卒㑹於簡易非敏識好學篤志而強力烏能爲之哉是書也甲寅歳甞進御於神宗皇帝備乙夜之覽當時頗蒙稱獎子平祕而不以示人予病近時儒者篤於窮經而未皇及傳記簡䇿之學間有從事於斯者如前之云云因募工鏤板以廣其傳庶幾讀之者用力甚少而收功彌愽噫士之不欲知古昔則巳如欲從容間燕上論其丗視數千百歳之逺如在掌上捨此書何以哉又如朝廷作新法令更易制度凡禮樂刑政之所關敎化㳂革之所自紀元立號於此質疑上則資人主之顧問次則備平居之遺忘據舊鑒新可以縷數然則補助學問豈尺寸之功歟愽進編年通載表臣衡言臣聞今之所以知古後之所以知今其君臣之系治亂之迹紀歷之元必憑諸史以傳天下兹事體大自昔才難臣衡誠惶誠懼頓首頓首竊以尭舜二典夏商周之訓誓誥命春秋之二百四十二年行事皆出聖人手筆渾深奥密莫敢倫擬兩漢以來自馬遷因秦火之餘輯殘脫之經及戰國百家之說又率已意易編年而爲紀傳世家表書上下數千載最爲雄贍采摭精粗不能無失揔三千四百年目之曰編年通載其刋正謬誤如史記以爲舜年二十以孝聞三十堯舉之五十攝行天子事六十有一而踐帝位在位三十九年今以虞書考之則舜生三十豋庸三十
