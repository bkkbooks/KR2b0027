body:
  text: 位五十載乃知司馬遷之妄如魏受漢禪漢紀以爲延康元年十月乙夘魏志以爲十一月庚午受禪壇碑以爲十月辛未夫禪代大事也而三說不同今以詔冊書令推之實以十月乙夘䇿詔使奉璽綬二十九日辛未始豋壇受命乃知史官之失佗類此者何又莫得而見臣今所書者或得於詔勑或得於圖録或得於十國傳志或得於羣臣家集略舉大綱以貽萬丗於戲夏有天下四百三十二年其爲善治者啓少康五十九年而巳商有天下六百二十九年其爲善治者太甲太戊武丁一百六十七年而巳周有天下八百六十七年其爲善治者成康宣一百一十九年而巳兩漢有天下四百二十六年其爲善治者文景宣光明章一百四十年而巳後魏享國一百七十一年有志于治者孝文而巳唐有天下二百九十年其爲善治者正觀開元五十二年而巳善治如此其少也王道如此其難行也天造我宋其鴻猷盛烈安平之乆推之前丗未有其比恭惟皇帝陛下光宅丕圖祗遹先憲攄衍靈命以垂無窮若鑒古制作則臣之此書不逾几席可以窮百王之軌轍若新曆元朔則臣之此書不離掌握可以知千歳之號名是敢冒昧天威仰塵乙覽儻蒙收採則臣之疲心刓精庶幾少補其編年通載十冊謹隨表上進以聞臣衡誠惶誠懼頓首頓首謹言
  hash: sha256:a40721c59b7de579ff271c5e5cc129fc53d01376d148de08c781d6b4a4db410c
