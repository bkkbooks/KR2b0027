body:
  text: 起居舎人直集賢院同知審官西院事兼判史舘臣章衡上進帝堯謚法翼善傳聖曰堯伊祁姓帝嚳娶陳􅄡氏慶都生放勲以唐侯􅂛爲天子號曰陶唐氏都平陽樂曰大章孔子曰大哉堯之爲君也巍巍乎唯天爲大唯堯則之蕩蕩乎民無能名焉堯子丹朱不肖以天下授之舜二十八載而殂落凡在位九十八年皇甫謐曰堯以甲申􅀊生甲辰即帝位甲午用舜甲寅舜攝政辛巳終壽百一十六歳皇覽曰尭冢在濟隂城陽帝舜謚法仁聖盛明曰舜姚姓帝髙陽七丗孫父曰瞽瞍母曰握登年二十以孝聞三十登庸三十在位歷試二年攝政二十八年受終于文祖天下號曰有虞氏都蒲坂樂曰大韶孔子曰韶盡羙矣又盡善也君臣相敕維是幾安而股肱不良萬事墮壞故天下明德皆自舜始五十載陟方乃死皇甫謚曰舜以甲子歳生甲午登用壬午即真癸夘终葬於蒼梧之野夏禹謚法受襌成功曰禹姒姓父曰鲧母有莘氏脩巳禹治水有功舜子商均亦不肖乃薦禹於天而授之位天下號曰夏后氏都安邑樂曰犬夏孔子曰禹菲飲食而致孝乎􅀑神惡衣服而致羙乎黻冕卑宫室而盡力乎溝洫在位十年東巡狩至于㑹稽而终皇甫謐曰年百歳子啓嗣啓其母塗山氏之女啓與有扈戰于甘之野作甘誓皇甫謐曰啓元年甲辰十年癸丑終太康啓之子在位二十九年畋于洛十旬弗反有窮后羿距于河厥弟五人御其母徯于洛之汭述大禹之戒以作歌太康遂失國而死仲康太康之弟羿廢太康而立之羲和湎􅁋廢厥職命師徂征仲康在位十三年相仲康之子徙都商丘在位二十八年有窮氏羿羿逐相而簒其位立二年爲其臣寒浞所滅寒浞殺羿自立十年爲夏臣靡所誅少康相之子母有仍氏之女有田一成有衆一旅復禹舊迹祀夏配天在位四十九年宁少康之子一作杼在位十七年槐宁之子在位二十六年芒槐之子在位十八年泄芒之子在位十六年不降泄之子在位五十九年扄不降之弟在位二十一年廑扄之子在位二十年孔甲不降之子好􅀑神􅁋亂諸侯叛之御龍氏懼而去在位三十一年臯孔甲之子在位十一年發臯之子墓在殽南陵在位十年太甲太丁之子旣立㒹覆湯之典刑伊尹放諸桐三年悔過思庸伊尹復政厥辟歸于亳享國三十三年年百歳廟稱太宗沃丁太甲之子在位三十年八年伊尹卒沃丁葬之于亳太庚沃丁之弟在位二十五年小甲太庚之子在位十七年以七年二月甲申朔旦起曆雍巳小甲之弟在位十二年太戊雍巳之弟以伊尹之子陟爲相亳有祥桑榖共生于朝太戊懼而脩德二木死享國七十五年廟稱中宗仲丁太戊之子遷都于嚻在位十一年外壬仲丁之弟在位十五年河亶甲外壬之弟居於相在位九年祖乙河亶甲之子遷于耿巫賢任職商復興在位十九年祖辛祖乙之子在位十六年沃甲柤辛之弟在位二十五年祖丁祖辛之子在位三十二年南庚沃甲之子在位二十九年陽甲祖丁之子在位十七年自仲丁以來廢適更立諸弟子弟子或爭相代立比九丗亂諸侯莫朝盤庚陽甲之弟自湯至盤庚五遷國都盤庚復居于亳作盤庚三篇行湯之政商復興在位十八年小辛盤庚之弟在位二十一年小乙小辛之弟在位二十年武丁小乙之子以傅􅀃爲相修政行德天下咸驩享國五十九年年百歳廟稱髙宗祖庚武丁之子在位七年祖甲祖庚之弟􅁋亂政衰在位十六年廪辛祖甲之弟在位六年庚丁廪辛之弟在位二十一年武乙庚丁之子徙居河北無道慢神獵於河渭間􅁀雷震死在位四年太丁一日文丁武乙之子在位三年乙太丁之子啇益衰在位三十七年辛紂乙長子啓啓母賤不得嗣少子辛立一名受嬖妲已用費中惡來天下謂之紂武王伐之赴火而死在位三十三年商湯自庚戍建國盡戊寅十七丗三十王凡六百二十九年周文王昌姬姓其先后稷始封於邰至于慶節立國於􅃎古公亶父止於􅄮下古公有子太伯虞仲季歷季歷生昌有聖瑞古公曰我丗當有興者其在昌乎太伯虞仲知古公欲立季歷以傳昌乃亡如荆蠻其後昌立是爲西伯徙都於豐三分天下有其二猶服事商享國五十年壽九十七武王追尊古公爲太王西伯爲文王太子發立是爲武王以太公望爲師周公旦爲輔召公畢公爲左右九年觀兵至于盟津十一年一月戊午伐紂遂戰于牧野革商受命天下號曰周都鎬京樂曰大武在位七年壽九十三從黃帝至武王十九丗魯武王克商封弟周公旦於曲阜爲魯公公留輔王室使子伯禽歸國淮夷徐戎爲㓂伯禽征之作費誓公宰折子考公酋折焬公熈折幽微公㵒厲公擢獻公具愼公濞齊姜姓侯爵武王封太公望吕尚於營丘曰齊成王又命之曰五侯九伯汝得征之以夾輔周室子丁公伋伋子乙公得得子癸公慈母慈母子哀公不辰胡公靜獻公山子武公壽吴子爵武王求太伯仲雍之後得其曽孫周章周章巳君吴因而封之至壽夢始大稱王陳侯爵武王求舜後得虞遏父之子滿封之於陳賜姓曰嬀號胡公以奉舜祀子申公犀侯相公臯羊考公突幽公寧折愼公圉戎曹伯爵武王封弟叔振鐸於陶丘曰曹子太伯脾立仲君平宫伯侯孝伯雲夷伯喜北燕􅁎姓伯爵武王封召公奭於北燕成王時爲三公自陜以西召伯主之居鹿陽薊縣至簡公欵成王誦武王太子即位年少其叔父周公旦攝政當國管叔蔡叔流言曰公將不利於孺子乃與武庚作亂周公奉王命征之誅武庚管叔放蔡叔天動威以彰公之德成王寤逆公卒相乃營洛邑制禮作樂七年歸政于王宋子姓公爵武王伐紂而封其子武庚以紹商後武庚旣誅成王更封微子啓爲宋公以奉先祀都商丘微仲衍折宋公稽子閔公共焬公熈折丁公申厲公鮒昭王瑕康王子王道微缺南廵守卒于江上其卒不赴告諱之也在位五十一年穆王滿昭王子即位年巳五十犬戎荒服者不至命甫侯訓夏贖刑在位五十五年年百四歳共王扈穆王子在位十二年懿王囏共王子王室衰詩人興刺在位二十五年孝王共王弟在位十五年秦其先伯翳佐舜有㓛賜姓曰嬴後有非子事周孝王使之養馬於汧渭間封爲附庸邑於秦非子曽孫秦仲宣王命爲大夫至襄公始列爲諸侯夷王爕懿王太子在位十六年厲王胡夷王子好利近榮夷公􅁀虐弭謗國人叛襲之出奔於􅇾而死在位三十七年共和十四年厲王出召公虎周公二相行政號曰共和凡十四年始於庚申止於
